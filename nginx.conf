server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cabeceras de seguridad (paridad con vercel.json — mantener sincronizadas)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # HSTS solo tiene efecto sobre HTTPS (detrás del proxy TLS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.talkjs.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://ui-avatars.com https://*.talkjs.com https://vitsync-api-testing.onrender.com https://vitsync-api.onrender.com; connect-src 'self' http://localhost:8080 ws://localhost:8080 https://vitsync-api-testing.onrender.com wss://vitsync-api-testing.onrender.com https://vitsync-api.onrender.com wss://vitsync-api.onrender.com https://*.talkjs.com wss://*.talkjs.com; font-src 'self' data:; frame-src https://*.talkjs.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # Nota: X-XSS-Protection se elimina a propósito — está deprecado y el
    # auditor XSS de navegadores antiguos introducía vulnerabilidades propias.

    # Cache de assets estáticos (JS, CSS, imágenes con hash de Vite)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — redirige todas las rutas a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
